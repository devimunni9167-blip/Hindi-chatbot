<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Hindi AI Chatbot</title>
<script>
// *** यहाँ अपनी API KEY डालो ***
const API_KEY = "AIzaSyBip9Xk2D_wjVyqPGUp4QPSdNKRz1F5Q20";
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);font-family:Georgia,serif;color:#f0e6d3;display:flex;flex-direction:column;align-items:center;padding:20px 16px}
h1{font-size:clamp(22px,6vw,36px);background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:bold;text-align:center;margin-bottom:6px}
.subtitle{font-size:13px;color:#b0a8d0;text-align:center;margin-bottom:20px}
.card{width:100%;max-width:680px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:20px}
#chatbox{display:flex;flex-direction:column;gap:14px;min-height:300px;max-height:420px;overflow-y:auto;margin-bottom:16px}
.msg{padding:12px 16px;border-radius:18px;font-size:14px;line-height:1.7;max-width:85%;white-space:pre-wrap}
.user{align-self:flex-end;background:linear-gradient(135deg,#f7971e44,#ffd20022);border:1px solid #f7971e66;border-radius:18px 18px 4px 18px}
.ai{align-self:flex-start;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);border-radius:4px 18px 18px 18px}
.input-row{display:flex;gap:10px}
input{flex:1;background:rgba(0,0,0,0.3);border:1px solid rgba(255,220,80,0.3);border-radius:12px;padding:12px 16px;color:#f0e6d3;font-size:14px;font-family:inherit;outline:none}
button{background:linear-gradient(90deg,#f7971e,#ffd200);border:none;border-radius:12px;padding:12px 20px;font-size:18px;cursor:pointer;color:#1a1235;font-weight:bold}
</style>
</head>
<body>
<h1>🤖 Hindi AI Chatbot</h1>
<p class="subtitle">Koi bhi sawaal poochho — Hindi mein jawab milega!</p>
<div class="card">
<div id="chatbox">
<div class="msg ai">🤖 Namaste! Main tumhara Hindi assistant hoon!</div>
</div>
<div class="input-row">
<input id="inp" placeholder="Sawaal likho..." onkeydown="if(event.key==='Enter')send()"/>
<button onclick="send()">➤</button>
</div>
</div>
<script>
const hist=[];
async function send(){
const inp=document.getElementById('inp');
const box=document.getElementById('chatbox');
const t=inp.value.trim();
if(!t)return;
inp.value='';
box.innerHTML+=`<div class="msg user">🧑 ${t}</div>`;
box.innerHTML+=`<div class="msg ai" id="ld">⏳ Soch raha hoon...</div>`;
box.scrollTop=box.scrollHeight;
hist.push({role:"user",content:t});
try{
const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":API_KEY,"anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"Tu ek helpful Hindi assistant hai. Hamesha Hindi mein jawab de.",messages:hist})});
const d=await r.json();
const rep=d.content?.[0]?.text||"Dobara try karo.";
hist.push({role:"assistant",content:rep});
document.getElementById('ld').remove();
box.innerHTML+=`<div class="msg ai">🤖 ${rep}</div>`;
}catch(e){
document.getElementById('ld').remove();
box.innerHTML+=`<div class="msg ai">❌ Error aa gaya.</div>`;
}
box.scrollTop=box.scrollHeight;
}
</script>
</body>
</html>
